name: pipeline CI/CD do emergency

on:
  push:
    branches: [main, master]

jobs: 
  continuos-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Download all
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Rodar testes
        run: npm run test -- --passWithNoTests

  # PARTE DO CD
  continuos-deployment:
    runs-on: ubuntu-latest
    needs: [continuos-integration]
    steps:
      - name: Conectar no servidor e atualizar app
        run: |
          echo "Simulando deploy no servidor de produção..."
          # Exemplo de comando futuro de deploy via SSH:
          # echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          # chmod 600 private_key.pem
          # ssh -i private_key.pem -o StrictHostKeyChecking=no user@host "cd /app/backend && git pull && npm ci && npm run build && pm2 restart main"