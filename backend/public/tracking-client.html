<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Route — Rastreamento</title>
    <style>
        * { box-sizing: border-box; }
        body { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; }
        h1 { margin-bottom: .25rem; }
        p { color: #94a3b8; }
        .card { padding: 1.25rem; margin-top: 1rem; border: 1px solid #2d3748; border-radius: 12px; background: #1e2330; }
        label { display: block; margin: .8rem 0 .3rem; color: #94a3b8; font-size: .85rem; }
        input { width: 100%; padding: .7rem; border: 1px solid #2d3748; border-radius: 8px; background: #0f1117; color: #f8fafc; }
        button { margin-top: 1rem; padding: .75rem 1rem; border: 0; border-radius: 8px; cursor: pointer; font-weight: 700; }
        #btn-start { background: #22c55e; color: white; } #btn-stop { background: #ef4444; color: white; margin-left: .5rem; }
        button:disabled { opacity: .45; cursor: not-allowed; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .75rem; }
        .value { display: block; padding: .7rem; border-radius: 8px; background: #0f1117; color: #38bdf8; font-variant-numeric: tabular-nums; }
        #log { max-height: 200px; overflow-y: auto; font: .8rem ui-monospace, monospace; }
        #log p { margin: .35rem 0; } .ok { color: #22c55e; } .err { color: #ef4444; } .info { color: #38bdf8; }
        .active { color: #22c55e; } .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>Emergency Route</h1>
    <p>Rastreamento WebSocket em tempo real</p>

    <section class="card">
        <label for="vehicule-id">ID do veículo</label>
        <input id="vehicule-id" placeholder="UUID do veículo" />

        <label for="socket-url">URL do WebSocket</label>
        <input id="socket-url" value="http://localhost:3000/realtime" />

        <label for="device-token">Token temporário do dispositivo</label>
        <input id="device-token" type="password" placeholder="Gerado em POST /tracking/device-token/:vehiculeId" />

        <button id="btn-start" onclick="startTracking()">Iniciar</button>
        <button id="btn-stop" onclick="stopTracking()" disabled>Parar</button>
    </section>

    <section class="card">
        <strong id="status-text">Aguardando início…</strong>
        <p>Envios confirmados: <span id="send-count">0</span></p>
        <div class="grid">
            <div><label>Latitude</label><span id="lat" class="value">—</span></div>
            <div><label>Longitude</label><span id="lng" class="value">—</span></div>
            <div><label>Velocidade</label><span id="speed" class="value">—</span></div>
            <div><label>Precisão</label><span id="accuracy" class="value">—</span></div>
            <div><label>Direção</label><span id="heading" class="value">—</span></div>
        </div>
    </section>

    <section class="card"><div id="log"></div></section>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        let socket = null;
        let watchId = null;
        let sending = false;
        let sendCount = 0;
        let sequence = 0;
        const queueKey = "tracking-location-queue";

        function getQueue() { return JSON.parse(localStorage.getItem(queueKey) || "[]"); }
        function saveQueue(queue) { localStorage.setItem(queueKey, JSON.stringify(queue)); }

        function log(message, type = "") {
            const line = document.createElement("p");
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString("pt-BR")}] ${message}`;
            document.getElementById("log").prepend(line);
        }

        function setStatus(text, state = "") {
            const element = document.getElementById("status-text");
            element.textContent = text;
            element.className = state;
        }

        function updateScreen(coords) {
            document.getElementById("lat").textContent = coords.latitude.toFixed(6);
            document.getElementById("lng").textContent = coords.longitude.toFixed(6);
            document.getElementById("speed").textContent = coords.speed == null ? "—" : `${(coords.speed * 3.6).toFixed(1)} km/h`;
            document.getElementById("accuracy").textContent = coords.accuracy == null ? "—" : `${coords.accuracy.toFixed(0)} m`;
            document.getElementById("heading").textContent = coords.heading == null ? "—" : `${coords.heading.toFixed(0)}°`;
        }

        function enqueueLocation(coords) {
            const queue = getQueue();
            queue.push({
                eventId: crypto.randomUUID(),
                sequence: ++sequence,
                vehiculeId: document.getElementById("vehicule-id").value.trim(),
                latitude: coords.latitude,
                longitude: coords.longitude,
                speed: coords.speed ?? null,
                accuracy: coords.accuracy ?? null,
                heading: coords.heading ?? null,
                capturedAt: new Date().toISOString(),
            });
            saveQueue(queue);
            flushQueue();
        }

        function flushQueue() {
            if (!socket?.connected || sending) return;
            const nextEvent = getQueue()[0];
            if (!nextEvent) return;
            sending = true;
            socket.emit("location.update", nextEvent);
        }

        function connectSocket() {
            socket = io(document.getElementById("socket-url").value.trim(), {
                auth: { token: document.getElementById("device-token").value.trim() },
                transports: ["websocket"],
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 10000,
            });

            socket.on("connect", () => { setStatus("Conectado e rastreando", "active"); log("WebSocket conectado.", "ok"); flushQueue(); });
            socket.on("disconnect", () => { sending = false; setStatus("Sem conexão; fila local ativa", "error"); log("WebSocket desconectado.", "err"); });
            socket.on("connect_error", (error) => log(`Falha na conexão: ${error.message}`, "err"));
            socket.on("exception", (error) => { sending = false; log(error.message || "Mensagem rejeitada pelo servidor.", "err"); });
            socket.on("location.accepted", ({ eventId }) => {
                saveQueue(getQueue().filter((event) => event.eventId !== eventId));
                sending = false;
                sendCount += 1;
                document.getElementById("send-count").textContent = sendCount;
                flushQueue();
            });
        }

        function startTracking() {
            const vehiculeId = document.getElementById("vehicule-id").value.trim();
            const token = document.getElementById("device-token").value.trim();
            if (!vehiculeId || !token) { log("Informe o veículo e o token do dispositivo.", "err"); return; }
            if (!navigator.geolocation) { log("Geolocalização indisponível neste navegador.", "err"); return; }

            document.getElementById("btn-start").disabled = true;
            document.getElementById("btn-stop").disabled = false;
            connectSocket();
            watchId = navigator.geolocation.watchPosition(
                (position) => { updateScreen(position.coords); enqueueLocation(position.coords); },
                (error) => { setStatus("Erro de GPS", "error"); log(`Erro de GPS: ${error.message}`, "err"); },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 20000 },
            );
        }

        function stopTracking() {
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            if (socket) socket.disconnect();
            watchId = null;
            socket = null;
            sending = false;
            setStatus("Rastreamento parado");
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
            log("Rastreamento interrompido.", "info");
        }
    </script>
</body>
</html>
